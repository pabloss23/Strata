name: Refresh dataset
on:
  schedule:
    - cron: "0 6 1 * *"   # dia 1 de cada mes
  workflow_dispatch:
jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r data/pipeline/requirements.txt
      - run: python data/pipeline/build_dataset.py
      - name: Commit dataset
        run: |
          git config user.name "strata-bot"
          git config user.email "bot@strata.local"
          git add data/processed/countries.json || true
          git commit -m "chore: refresh dataset" || echo "sin cambios"
          git push || echo "nada que empujar"
