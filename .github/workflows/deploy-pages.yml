name: Deploy a GitHub Pages

# Publica la web automáticamente en cada push a main.
# URL: https://<usuario>.github.io/<repo>/  (p. ej. https://pabloss23.github.io/strata/)
#
# IMPORTANTE (una sola vez): en GitHub → Settings → Pages → "Build and deployment"
# → Source: "GitHub Actions". Con eso, este workflow despliega solo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Construir (con base = nombre del repo)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - name: Fallback SPA (404) + .nojekyll
        run: |
          cp apps/web/dist/index.html apps/web/dist/404.html
          touch apps/web/dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
